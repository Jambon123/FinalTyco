# Configuration values for Multiblocks
Multiblocks:
  # Whether the Robust Alloy Materializer is Enabled.
  RamEnabled: true

  # Whether the Advanced Cracking Unit is Enabled.
  AcuEnabled: true

  # Whether the Enlarged Reaction Chamber is Enabled.
  ErcEnabled: true

  # Whether the Large Pyrolysis Unit is Enabled.
  LpuEnabled: true

  # Whether the Advanced Fusion Reactors are Enabled.
  AfrEnabled: true

  # Whether the Compact Assembly Line is Enabled.
  CalEnabled: true

  # Whether the Rock Processing Facility is Enabled.
  RpfEnabled: false

  # Whether the Industrial Greenhouse is Enabled.
  IghEnabled: true

  # Whether the Tree Growing Chamber is Enabled.
  TgcEnabled: true

  # Whether the Disassembler is Enabled.
  DaEnabled: false

  # Whether the Expanded Data Bank is Enabled.
  EdaEnabled: true

  # Whether the Cloud Transmission Database is Enabled.
  CtdEnabled: true

# Configuration Values for Machines and Items
Miscellaneous:
  # Whether the Universal Circuits are Enabled.
  universalCircuits: true

  # Whether the Expanded Data Access Hatches are Enabled.
  expandedDataAccessHatches: true

# Special section for Wireless Machines
Wireless:
  # Whether the Wireless Optical Hatches & Cloud Transmission Database are Enabled.
  wirelessUtils: true

